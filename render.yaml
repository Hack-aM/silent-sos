services:
  - type: web
    name: silent-sos-system
    env: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --chdir backend 'app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: silent-sos-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://silent-sos-system.onrender.com"

databases:
  - name: silent-sos-db
    databaseName: silentsos
    user: silentsos_user
    plan: free
    region: singapore
